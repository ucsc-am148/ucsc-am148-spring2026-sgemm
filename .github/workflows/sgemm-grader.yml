# SGEMM autograder — POSTs the student's kernels.py to the Modal grader
# endpoint and posts the grade as a commit comment.
#
# This workflow lives in a GitHub Classroom assignment template. When a
# student accepts the assignment, Classroom creates a fresh private repo
# from this template; the workflow runs on every push to main against
# THAT student's repo, with secrets inherited from the Classroom.
#
# Submission cap: 5 graded runs per repo (= per student). We count past
# commit comments tagged with the marker below. The cap is per-Classroom-
# repo: a fresh accept gives a fresh count.
#
# Required secrets (set at the Classroom level so they propagate to every
# student repo, or at the org level if all assignments share them):
#   MODAL_GRADER_URL   — deployed endpoint, e.g. https://bigpseud--grade.modal.run
#   MODAL_AUTH_TOKEN   — matches the AUTH_TOKEN in the Modal secret
#                        sgemm-autograder-token

name: SGEMM autograder

on:
  push:
    branches: [main]
    paths:
      - kernels.py
  # Manual trigger for the instructor or the student to re-run without
  # having to push a no-op commit.
  workflow_dispatch:

permissions:
  contents: write    # required to post commit comments

concurrency:
  group: sgemm-grader-${{ github.ref }}
  cancel-in-progress: true

jobs:
  grade:
    runs-on: ubuntu-latest
    env:
      MARKER: "<!-- sgemm-autograder-result -->"
      CAP_MARKER: "<!-- sgemm-autograder-cap -->"
      MAX_SUBMISSIONS: 5
      REPO: ${{ github.repository }}
      SHA: ${{ github.sha }}

    steps:
      - name: Count past graded submissions
        id: cap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Count past commit comments tagged with our result marker.
          # Each grader run posts exactly one such comment, so the count
          # equals the number of completed graded submissions.
          count=$(gh api "/repos/$REPO/comments" --paginate \
            --jq "[.[] | select(.body | contains(\"$MARKER\"))] | length" \
            | awk '{ s += $1 } END { print s+0 }')
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Decide whether to grade
        id: gate
        run: |
          if [ "${{ steps.cap.outputs.count }}" -ge "$MAX_SUBMISSIONS" ]; then
            echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment that submission cap is reached
        if: steps.gate.outputs.go == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Post the cap message at most once per repo.
          existing=$(gh api "/repos/$REPO/comments" --paginate \
            --jq "[.[] | select(.body | contains(\"$CAP_MARKER\"))] | length" \
            | awk '{ s += $1 } END { print s+0 }')
          if [ "$existing" = "0" ]; then
            cat > /tmp/cap_body.md <<EOF
          $MARKER
          $CAP_MARKER
          ## SGEMM autograder

          Submission cap reached ($MAX_SUBMISSIONS / $MAX_SUBMISSIONS).

          You've used all of your graded runs on this assignment. If you
          believe an additional attempt is warranted, contact the
          instructor — they can grant manual extensions.
          EOF
            jq -n --rawfile body /tmp/cap_body.md '{body: $body}' > /tmp/cap_payload.json
            gh api -X POST "/repos/$REPO/commits/$SHA/comments" \
              --input /tmp/cap_payload.json
          fi

      - name: Fetch student kernels.py
        if: steps.gate.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "/repos/$REPO/contents/kernels.py?ref=$SHA" \
            --jq '.content' | base64 -d > /tmp/student_kernels.py
          test -s /tmp/student_kernels.py
          echo "Fetched $(wc -l < /tmp/student_kernels.py) lines from kernels.py."

      - name: Submit to Modal grader
        if: steps.gate.outputs.go == 'true'
        env:
          MODAL_URL: ${{ secrets.MODAL_GRADER_URL }}
          MODAL_TOKEN: ${{ secrets.MODAL_AUTH_TOKEN }}
        run: |
          jq -Rs '{kernels_py: .}' /tmp/student_kernels.py > /tmp/payload.json
          http_code=$(curl -sS -o /tmp/grade.json -w "%{http_code}" \
            -X POST "$MODAL_URL" \
            -H "Content-Type: application/json" \
            -H "X-Auth-Token: $MODAL_TOKEN" \
            --max-time 600 \
            -d @/tmp/payload.json)
          if [ "$http_code" != "200" ]; then
            echo "::error::Modal grader returned HTTP $http_code"
            cat /tmp/grade.json || true
            exit 1
          fi

      - name: Post grade as commit comment
        if: steps.gate.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          remaining=$((MAX_SUBMISSIONS - ${{ steps.cap.outputs.count }} - 1))
          grade=$(jq -r '.grade // "?"' /tmp/grade.json)
          passed=$(jq -r '.kernels_passed // 0' /tmp/grade.json)
          summary=$(jq -r '
            (.kernels // {}) | to_entries | map(
              "- **" + .key + "**: " +
              (if .value.passed then "PASS" else "FAIL" end) +
              (if .value.reason then " (" + .value.reason + ")" else "" end)
            ) | join("\n")
          ' /tmp/grade.json)

          {
            echo "$MARKER"
            echo "## SGEMM autograder result"
            echo
            echo "**Grade: \`$grade\`** ($passed / 4 kernels passed)"
            echo
            echo "$summary"
            echo
            echo "---"
            echo "Submissions remaining: $remaining / $MAX_SUBMISSIONS"
            echo
            echo "<details><summary>Full report (JSON)</summary>"
            echo
            echo '```json'
            cat /tmp/grade.json
            echo
            echo '```'
            echo "</details>"
          } > /tmp/comment.md

          jq -n --rawfile body /tmp/comment.md '{body: $body}' > /tmp/comment_payload.json
          gh api -X POST "/repos/$REPO/commits/$SHA/comments" \
            --input /tmp/comment_payload.json
